version: 2
updates:
  - package-ecosystem: gomod
    directory: /golang
    schedule:
      interval: weekly
    labels:
      - dependencies
    commit-message:
      prefix: "deps"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    labels:
      - dependencies
    commit-message:
      prefix: "ci"

  - package-ecosystem: docker
    directory: /golang
    schedule:
      interval: weekly
    labels:
      - dependencies
    commit-message:
      prefix: "build"
